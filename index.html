<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Victoverse Press — Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0d1b2a;
    --navy-mid: #1a2d42;
    --navy-light: #243750;
    --gold: #c9963a;
    --gold-light: #e0b86a;
    --gold-pale: #f5e9d0;
    --cream: #faf6ef;
    --text: #1a1a1a;
    --text-muted: #6b6255;
    --border: rgba(201,150,58,0.2);
  }

  [data-theme="dark"] {
    --bg: #0d1b2a;
    --bg-card: rgba(255,255,255,0.02);
    --bg-card-hover: rgba(201,150,58,0.06);
    --surface: #1a2d42;
    --text-primary: #faf6ef;
    --text-secondary: rgba(250,246,239,0.5);
    --text-muted: rgba(201,150,58,0.5);
    --border-color: rgba(201,150,58,0.12);
    --border-hover: rgba(201,150,58,0.25);
    --header-bg: #0d1b2a;
    --header-border: rgba(201,150,58,0.3);
    --note-bg: rgba(201,150,58,0.05);
    --note-border: rgba(201,150,58,0.2);
    --print-hide: block;
  }

  [data-theme="light"] {
    --bg: #f5efe3;
    --bg-card: rgba(255,255,255,0.7);
    --bg-card-hover: rgba(201,150,58,0.08);
    --surface: #fff;
    --text-primary: #1a1008;
    --text-secondary: rgba(26,16,8,0.5);
    --text-muted: #8a6830;
    --border-color: rgba(201,150,58,0.2);
    --border-hover: rgba(201,150,58,0.45);
    --header-bg: #f0e8d6;
    --header-border: rgba(201,150,58,0.35);
    --note-bg: rgba(201,150,58,0.07);
    --note-border: rgba(201,150,58,0.25);
  }

  body {
    font-family: 'Jost', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* HEADER */
  .header {
    background: var(--header-bg);
    border-bottom: 1px solid var(--header-border);
    padding: 2rem 3rem 1.75rem;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background 0.3s, border-color 0.3s;
  }

  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.8rem;
    font-weight: 500;
    color: var(--gold-light);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }

  .title-block p {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 0.3rem;
  }

  .header-right {
    display: flex;
    align-items: flex-start;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .stats-row {
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  .stat { text-align: center; }

  .stat-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2rem;
    font-weight: 600;
    color: var(--gold);
    line-height: 1;
  }

  .stat-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 0.2rem;
  }

  .stat-divider {
    width: 1px;
    height: 2rem;
    background: rgba(201,150,58,0.2);
  }

  /* TOOLBAR */
  .toolbar {
    display: flex;
    gap: 0.6rem;
    align-items: center;
    margin-top: 0.25rem;
  }

  .btn-icon {
    background: none;
    border: 1px solid var(--border-color);
    color: var(--text-muted);
    border-radius: 6px;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'Jost', sans-serif;
    letter-spacing: 0.06em;
    transition: all 0.18s;
    display: flex;
    align-items: center;
    gap: 0.4rem;
    white-space: nowrap;
  }

  .btn-icon:hover {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .btn-icon svg { width: 14px; height: 14px; flex-shrink: 0; }

  .progress-wrap {
    margin-top: 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .progress-bar {
    flex: 1;
    height: 2px;
    background: rgba(201,150,58,0.15);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 999px;
    transition: width 0.4s ease;
  }

  .progress-pct {
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    min-width: 2.5rem;
    text-align: right;
  }

  /* COUNTDOWN BANNER */
  .countdown-bar {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid rgba(201,150,58,0.1);
  }

  .countdown-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.72rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .countdown-days {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    color: var(--gold);
    font-weight: 600;
    line-height: 1;
    min-width: 1.5rem;
    text-align: center;
  }

  .countdown-label { color: var(--text-secondary); }

  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(201,150,58,0.3);
    flex-shrink: 0;
  }

  /* MAIN */
  .main {
    padding: 2rem 3rem 5rem;
    max-width: 860px;
  }

  .phase { margin-bottom: 2.5rem; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .phase-title {
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    font-weight: 500;
    white-space: nowrap;
  }

  .phase-line {
    flex: 1;
    height: 1px;
    background: rgba(201,150,58,0.12);
  }

  .phase-count {
    font-size: 0.65rem;
    color: rgba(201,150,58,0.35);
    letter-spacing: 0.06em;
  }

  .tasks {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* TASK ROW */
  .task {
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: var(--bg-card);
    transition: all 0.18s ease;
    overflow: hidden;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 14px;
    cursor: pointer;
    user-select: none;
  }

  .task:hover { background: var(--bg-card-hover); border-color: var(--border-hover); }

  .task.done { background: transparent; border-color: rgba(201,150,58,0.06); }
  .task.done .task-label { text-decoration: line-through; color: var(--text-secondary); opacity: 0.5; }
  .task.done .task-meta { opacity: 0.3; }
  .task.in-progress { border-left: 2px solid var(--gold); border-radius: 0 6px 6px 0; background: rgba(201,150,58,0.04); }

  .check {
    width: 18px; height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,150,58,0.3);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
  }

  .task:hover .check { border-color: rgba(201,150,58,0.6); }

  .check.checked { background: var(--gold); border-color: var(--gold); }
  .check.checked::after {
    content: '';
    display: block;
    width: 5px; height: 3px;
    border-left: 1.5px solid var(--navy);
    border-bottom: 1.5px solid var(--navy);
    transform: rotate(-45deg) translateY(-1px);
  }

  .task-label {
    font-size: 0.875rem;
    font-weight: 400;
    color: var(--text-primary);
    flex: 1;
    line-height: 1.4;
    transition: color 0.18s;
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .task-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .note-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    opacity: 0.4;
    padding: 2px 4px;
    border-radius: 4px;
    transition: all 0.15s;
    line-height: 0;
  }

  .note-btn:hover, .note-btn.has-note { opacity: 1; color: var(--gold); }

  .note-btn svg { width: 13px; height: 13px; }

  /* NOTE PANEL */
  .note-panel {
    display: none;
    padding: 0 14px 12px 46px;
  }

  .note-panel.open { display: block; }

  .note-panel textarea {
    width: 100%;
    background: var(--note-bg);
    border: 1px solid var(--note-border);
    border-radius: 5px;
    color: var(--text-primary);
    font-family: 'Jost', sans-serif;
    font-size: 0.8rem;
    font-weight: 300;
    line-height: 1.6;
    padding: 8px 10px;
    resize: vertical;
    min-height: 60px;
    outline: none;
    transition: border-color 0.15s;
    letter-spacing: 0.02em;
  }

  .note-panel textarea::placeholder { color: var(--text-muted); opacity: 0.6; }
  .note-panel textarea:focus { border-color: var(--gold); }

  /* BADGES */
  .badge {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge.done-badge { background: rgba(201,150,58,0.1); color: rgba(201,150,58,0.6); }
  .badge.active-badge { background: rgba(29,158,117,0.15); color: #5DCAA5; }
  .badge.pending-badge { background: rgba(255,255,255,0.05); color: var(--text-secondary); }
  .badge.urgent-badge { background: rgba(226,75,74,0.12); color: #F09595; }
  .badge.cost-badge { background: rgba(201,150,58,0.08); color: rgba(201,150,58,0.7); }

  .task-date {
    font-size: 0.7rem;
    color: var(--text-muted);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  /* PRINT */
  @media print {
    .header { position: static; }
    .toolbar, .note-btn, .countdown-bar { display: none !important; }
    .note-panel { display: block !important; }
    .note-panel textarea { border: 1px solid #ccc; background: #fff; color: #000; }
    body { background: #fff; color: #000; }
    .task-label { color: #000 !important; opacity: 1 !important; }
    .phase-title { color: #666 !important; }
    .stat-num { color: var(--gold) !important; }
  }

  @media (max-width: 640px) {
    .header { padding: 1.25rem 1.25rem 1rem; }
    .main { padding: 1.25rem 1.25rem 4rem; }
    .stats-row { gap: 1rem; }
    .stat-num { font-size: 1.5rem; }
    .header-right { gap: 1rem; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title-block">

    <div class="header-right">

  </div>
  <div class="countdown-bar" id="countdown-bar"></div>
</div>

<div class="main" id="main"></div>

<script>

];

// ─── STATE ────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'victoverse_tracker_v2';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const state = JSON.parse(saved);
    phases.forEach(phase => {
      phase.tasks.forEach(task => {
        if (state.statuses && state.statuses[task.id]) {
          task.status = state.statuses[task.id];
        }
        if (state.notes && state.notes[task.id] !== undefined) {
          task.note = state.notes[task.id];
        }
      });
    });
    if (state.theme) {
      document.documentElement.setAttribute('data-theme', state.theme);
      document.getElementById('theme-label').textContent = state.theme === 'dark' ? 'Light' : 'Dark';
    }
  } catch(e) {}
}

function saveState() {
  const statuses = {}, notes = {};
  phases.forEach(phase => {
    phase.tasks.forEach(task => {
      statuses[task.id] = task.status;
      if (task.note) notes[task.id] = task.note;
    });
  });
  const theme = document.documentElement.getAttribute('data-theme');
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ statuses, notes, theme }));
}

// ─── THEME ────────────────────────────────────────────────────────────────────
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-label').textContent = isDark ? 'Dark' : 'Light';
  saveState();
}

// ─── COUNTDOWN ────────────────────────────────────────────────────────────────
function renderCountdown() {
  const bar = document.getElementById('countdown-bar');
  const today = new Date(); today.setHours(0,0,0,0);
  const items = keyDates.map(kd => {
    const d = new Date(kd.date); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    return { label: kd.label, diff };
  });

  bar.innerHTML = items.map((item, i) => `
    <div class="countdown-item">
      <div class="countdown-days">${item.diff > 0 ? item.diff : item.diff === 0 ? '!' : '✓'}</div>
      <div class="countdown-label">${item.diff > 0 ? `days to` : item.diff === 0 ? 'today —' : 'passed —'} <strong>${item.label}</strong></div>
      ${i < items.length - 1 ? '<div class="dot"></div>' : ''}
    </div>
  `).join('');
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportData() {
  let text = 'THE VICTOVERSE PRESS — PROJECT TRACKER\n';
  text += 'Exported: ' + new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) + '\n\n';
  phases.forEach(phase => {
    const done = phase.tasks.filter(t => t.status === 'done').length;
    text += `── ${phase.title.toUpperCase()} (${done}/${phase.tasks.length})\n`;
    phase.tasks.forEach(task => {
      const mark = task.status === 'done' ? '✓' : task.status === 'active' ? '→' : '○';
      text += `  ${mark} ${task.label}\n`;
      if (task.note) text += `     Note: ${task.note}\n`;
    });
    text += '\n';
  });
  const blob = new Blob([text], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'victoverse-tracker.txt';
  a.click();
}

// ─── BADGE HELPERS ────────────────────────────────────────────────────────────
const badgeClass = { done: "done-badge", active: "active-badge", pending: "pending-badge", urgent: "urgent-badge", cost: "cost-badge" };

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';

  phases.forEach((phase, pi) => {
    const div = document.createElement('div');
    div.className = 'phase';
    const doneCount = phase.tasks.filter(t => t.status === 'done').length;

    div.innerHTML = `
      <div class="phase-header">
        <div class="phase-title">${phase.title}</div>
        <div class="phase-line"></div>
        <div class="phase-count">${doneCount}/${phase.tasks.length}</div>
      </div>
      <div class="tasks" id="phase-${pi}"></div>
    `;
    main.appendChild(div);

    const container = div.querySelector(`#phase-${pi}`);

    phase.tasks.forEach((task, ti) => {
      const t = document.createElement('div');
      t.className = 'task' + (task.status === 'done' ? ' done' : '') + (task.status === 'active' ? ' in-progress' : '');

      let metaHtml = '';
      if (task.status === 'done') {
        metaHtml = `<span class="badge done-badge">done</span>`;
      } else if (task.status === 'active') {
        metaHtml = `<span class="badge active-badge">in progress</span>`;
        if (task.meta?.text) metaHtml += `<span class="task-date">${task.meta.text}</span>`;
      } else if (task.meta) {
        metaHtml = `<span class="badge ${badgeClass[task.meta.badge] || 'pending-badge'}">${task.meta.text}</span>`;
      }

      const hasNote = task.note && task.note.trim().length > 0;
      const noteId = `note-${pi}-${ti}`;

      t.innerHTML = `
        <div class="task-row">
          <div class="check ${task.status === 'done' ? 'checked' : ''}"></div>
          <div class="task-label">${task.label}</div>
          <div class="task-meta">${metaHtml}</div>
          <div class="task-actions">
            <button class="note-btn ${hasNote ? 'has-note' : ''}" title="Add note" data-note-target="${noteId}">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
          </div>
        </div>
        <div class="note-panel" id="${noteId}">
          <textarea placeholder="Add a note…" rows="2">${task.note || ''}</textarea>
        </div>
      `;

      // Toggle task status (click on row but not on note btn)
      t.querySelector('.task-row').addEventListener('click', (e) => {
        if (e.target.closest('.note-btn')) return;
        phases[pi].tasks[ti].status = task.status === 'done' ? 'todo' : 'done';
        saveState();
        render();
      });

      // Toggle note panel
      t.querySelector('.note-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        const panel = document.getElementById(noteId);
        panel.classList.toggle('open');
        if (panel.classList.contains('open')) panel.querySelector('textarea').focus();
      });

      // Save note on input
      t.querySelector('textarea').addEventListener('input', (e) => {
        phases[pi].tasks[ti].note = e.target.value;
        const btn = t.querySelector('.note-btn');
        btn.classList.toggle('has-note', e.target.value.trim().length > 0);
        saveState();
      });

      container.appendChild(t);
    });
  });

  updateStats();
}

function updateStats() {
  let done = 0, active = 0, todo = 0, total = 0;
  phases.forEach(p => p.tasks.forEach(t => {
    total++;
    if (t.status === 'done') done++;
    else if (t.status === 'active') active++;
    else todo++;
  }));
  document.getElementById('done-count').textContent = done;
  document.getElementById('active-count').textContent = active;
  document.getElementById('todo-count').textContent = todo;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadState();
renderCountdown();
render();
</script>
</body>
</html>
