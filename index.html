<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Victoverse Press — Project Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root { --gold: #c9963a; --gold-light: #e0b86a; }

  [data-theme="dark"] {
    --bg: #0d1b2a; --bg-card: rgba(255,255,255,0.025); --bg-card-hover: rgba(201,150,58,0.07);
    --text-primary: #faf6ef; --text-secondary: rgba(250,246,239,0.45); --text-muted: rgba(201,150,58,0.55);
    --border-color: rgba(201,150,58,0.13); --border-hover: rgba(201,150,58,0.3);
    --header-bg: #0a1622; --header-border: rgba(201,150,58,0.25);
    --note-bg: rgba(201,150,58,0.05); --note-border: rgba(201,150,58,0.18);
    --panel-bg: #0f1e2e; --panel-border: rgba(201,150,58,0.15);
    --selected-bg: rgba(201,150,58,0.07); --selected-border: rgba(201,150,58,0.35);
  }

  [data-theme="light"] {
    --bg: #f2ead8; --bg-card: rgba(255,255,255,0.75); --bg-card-hover: rgba(201,150,58,0.08);
    --text-primary: #1a1008; --text-secondary: rgba(26,16,8,0.45); --text-muted: #8a6830;
    --border-color: rgba(201,150,58,0.2); --border-hover: rgba(201,150,58,0.45);
    --header-bg: #ebe0c8; --header-border: rgba(201,150,58,0.3);
    --note-bg: rgba(201,150,58,0.06); --note-border: rgba(201,150,58,0.22);
    --panel-bg: #faf6ef; --panel-border: rgba(201,150,58,0.2);
    --selected-bg: rgba(201,150,58,0.06); --selected-border: rgba(201,150,58,0.4);
  }

  body { font-family:'Jost',sans-serif; background:var(--bg); color:var(--text-primary); min-height:100vh; transition:background 0.3s,color 0.3s; }

  /* HEADER */
  .header { background:var(--header-bg); border-bottom:1px solid var(--header-border); padding:1.5rem 2.5rem 1.25rem; position:sticky; top:0; z-index:200; }
  .header-top { display:flex; align-items:center; justify-content:space-between; gap:1.5rem; flex-wrap:wrap; }
  .title-block h1 { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:500; color:var(--gold-light); letter-spacing:0.02em; }
  .title-block p { font-size:0.68rem; font-weight:300; color:var(--text-muted); letter-spacing:0.12em; text-transform:uppercase; margin-top:0.2rem; }
  .header-right { display:flex; align-items:center; gap:2rem; flex-wrap:wrap; }
  .stats-row { display:flex; gap:1.25rem; align-items:center; }
  .stat { text-align:center; }
  .stat-num { font-family:'Cormorant Garamond',serif; font-size:1.8rem; font-weight:600; color:var(--gold); line-height:1; }
  .stat-label { font-size:0.6rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); margin-top:0.15rem; }
  .stat-divider { width:1px; height:1.75rem; background:rgba(201,150,58,0.18); }
  .toolbar { display:flex; gap:0.5rem; align-items:center; }
  .btn-icon { background:none; border:1px solid var(--border-color); color:var(--text-muted); border-radius:6px; padding:0.35rem 0.65rem; cursor:pointer; font-size:0.72rem; font-family:'Jost',sans-serif; letter-spacing:0.06em; transition:all 0.18s; display:flex; align-items:center; gap:0.35rem; white-space:nowrap; }
  .btn-icon:hover { border-color:var(--gold); color:var(--gold-light); }
  .btn-icon svg { width:13px; height:13px; flex-shrink:0; }
  .progress-wrap { margin-top:1rem; display:flex; align-items:center; gap:1rem; }
  .progress-bar { flex:1; height:2px; background:rgba(201,150,58,0.12); border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:999px; transition:width 0.5s ease; }
  .progress-pct { font-size:0.68rem; letter-spacing:0.08em; color:var(--text-muted); min-width:2.5rem; text-align:right; }

  /* COUNTDOWN */
  .countdown-bar { display:flex; gap:1.25rem; flex-wrap:wrap; margin-top:0.85rem; padding-top:0.85rem; border-top:1px solid rgba(201,150,58,0.08); }
  .countdown-item { display:flex; align-items:center; gap:0.5rem; font-size:0.7rem; cursor:pointer; }
  .countdown-item:hover .countdown-label { color:var(--gold-light); }
  .countdown-days { font-family:'Cormorant Garamond',serif; font-size:1.05rem; color:var(--gold); font-weight:600; line-height:1; min-width:1.5rem; text-align:center; }
  .countdown-label { color:var(--text-secondary); }
  .countdown-label strong { color:var(--text-primary); }
  .dot { width:4px; height:4px; border-radius:50%; background:rgba(201,150,58,0.25); flex-shrink:0; }

  /* LAYOUT */
  .app-body { display:grid; grid-template-columns:1fr 400px; min-height:calc(100vh - 150px); align-items:start; }

  /* TASK LIST */
  .task-list-col { padding:1.75rem 2rem 5rem 2.5rem; }
  .phase { margin-bottom:2rem; }
  .phase-header { display:flex; align-items:center; gap:0.7rem; margin-bottom:0.6rem; }
  .phase-title { font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); font-weight:500; white-space:nowrap; }
  .phase-line { flex:1; height:1px; background:rgba(201,150,58,0.1); }
  .phase-count { font-size:0.62rem; color:rgba(201,150,58,0.3); letter-spacing:0.06em; }
  .tasks { display:flex; flex-direction:column; gap:4px; }

  .task { border-radius:7px; border:1px solid var(--border-color); background:var(--bg-card); transition:all 0.15s ease; overflow:hidden; cursor:pointer; }
  .task:hover { background:var(--bg-card-hover); border-color:var(--border-hover); }
  .task.selected { background:var(--selected-bg); border-color:var(--selected-border); }
  .task.done { background:transparent; border-color:rgba(201,150,58,0.05); }
  .task.done .task-label { text-decoration:line-through; color:var(--text-secondary); opacity:0.45; }
  .task.done .task-meta { opacity:0.3; }
  .task.in-progress { border-left:2px solid var(--gold); border-radius:0 7px 7px 0; background:rgba(201,150,58,0.04); }
  .task-row { display:flex; align-items:center; gap:12px; padding:11px 14px; user-select:none; }

  .check { width:17px; height:17px; border-radius:50%; border:1.5px solid rgba(201,150,58,0.3); flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.15s; }
  .task:hover .check { border-color:rgba(201,150,58,0.6); }
  .check.checked { background:var(--gold); border-color:var(--gold); }
  .check.checked::after { content:''; display:block; width:5px; height:3px; border-left:1.5px solid #0d1b2a; border-bottom:1.5px solid #0d1b2a; transform:rotate(-45deg) translateY(-1px); }

  .task-label { font-size:0.9rem; font-weight:400; color:var(--text-primary); flex:1; line-height:1.4; }
  .task-meta { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .task-indicators { font-size:0.7rem; opacity:0.45; flex-shrink:0; }

  .badge { font-size:0.62rem; letter-spacing:0.06em; padding:2px 9px; border-radius:999px; font-weight:500; white-space:nowrap; }
  .done-badge { background:rgba(201,150,58,0.1); color:rgba(201,150,58,0.6); }
  .active-badge { background:rgba(29,158,117,0.15); color:#5DCAA5; }
  .pending-badge { background:rgba(255,255,255,0.05); color:var(--text-secondary); }
  .cost-badge { background:rgba(201,150,58,0.08); color:rgba(201,150,58,0.7); }
  .task-date { font-size:0.68rem; color:var(--text-muted); white-space:nowrap; }

  /* DETAIL PANEL */
  .detail-panel { position:sticky; top:150px; height:calc(100vh - 150px); background:var(--panel-bg); border-left:1px solid var(--panel-border); display:flex; flex-direction:column; overflow:hidden; }
  .panel-empty { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0.75rem; color:var(--text-muted); opacity:0.4; padding:2rem; text-align:center; }
  .panel-empty svg { width:36px; height:36px; opacity:0.5; }
  .panel-empty p { font-size:0.8rem; letter-spacing:0.06em; line-height:1.6; }
  .panel-content { flex:1; display:flex; flex-direction:column; overflow:hidden; }

  .panel-header { padding:1.5rem 1.5rem 1rem; border-bottom:1px solid var(--panel-border); flex-shrink:0; }
  .panel-phase { font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.4rem; }
  .panel-title { font-family:'Cormorant Garamond',serif; font-size:1.2rem; font-weight:500; color:var(--text-primary); line-height:1.35; margin-bottom:1rem; }

  .panel-controls { display:flex; flex-direction:column; gap:0.6rem; }
  .ctrl-row { display:flex; align-items:center; gap:0.5rem; }
  .ctrl-label { font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); min-width:42px; flex-shrink:0; }

  .status-select { background:var(--note-bg); border:1px solid var(--note-border); color:var(--text-primary); font-family:'Jost',sans-serif; font-size:0.75rem; padding:0.3rem 0.6rem; border-radius:6px; cursor:pointer; outline:none; flex:1; }
  .date-input { background:var(--note-bg); border:1px solid var(--note-border); color:var(--text-primary); font-family:'Jost',sans-serif; font-size:0.75rem; padding:0.3rem 0.6rem; border-radius:6px; outline:none; flex:1; transition:border-color 0.15s; }
  .date-input:focus { border-color:var(--gold); }
  .date-input::placeholder { color:var(--text-muted); opacity:0.5; }

  .panel-body { flex:1; overflow-y:auto; padding:1.25rem 1.5rem; display:flex; flex-direction:column; gap:1.25rem; }
  .section-label { font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); margin-bottom:0.5rem; }

  .note-textarea { width:100%; background:var(--note-bg); border:1px solid var(--note-border); border-radius:7px; color:var(--text-primary); font-family:'Jost',sans-serif; font-size:0.85rem; font-weight:300; line-height:1.7; padding:0.85rem 1rem; resize:vertical; min-height:90px; outline:none; transition:border-color 0.15s; }
  .note-textarea::placeholder { color:var(--text-muted); opacity:0.5; }
  .note-textarea:focus { border-color:var(--gold); }

  /* VOICE */
  .recorder-bar { display:flex; align-items:center; gap:0.6rem; margin-bottom:0.75rem; }
  .rec-btn { width:38px; height:38px; border-radius:50%; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; flex-shrink:0; }
  .rec-btn.idle { background:rgba(201,150,58,0.15); color:var(--gold); }
  .rec-btn.idle:hover { background:rgba(201,150,58,0.25); }
  .rec-btn.recording { background:rgba(226,75,74,0.2); color:#F09595; animation:pulse 1.2s ease-in-out infinite; }
  .rec-btn svg { width:16px; height:16px; }
  @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(226,75,74,0.3)} 50%{box-shadow:0 0 0 8px rgba(226,75,74,0)} }
  .rec-status { font-size:0.72rem; color:var(--text-muted); letter-spacing:0.05em; flex:1; }
  .rec-status.active { color:#F09595; }
  .recordings-list { display:flex; flex-direction:column; gap:8px; }
  .recording-item { background:var(--note-bg); border:1px solid var(--note-border); border-radius:7px; padding:0.6rem 0.85rem; display:flex; align-items:center; gap:0.6rem; }
  .recording-item audio { flex:1; height:28px; min-width:0; }
  .rec-time { font-size:0.65rem; color:var(--text-muted); white-space:nowrap; letter-spacing:0.04em; flex-shrink:0; }
  .del-rec { background:none; border:none; cursor:pointer; color:var(--text-muted); opacity:0.4; padding:2px; transition:opacity 0.15s; flex-shrink:0; line-height:0; }
  .del-rec:hover { opacity:1; color:#F09595; }
  .del-rec svg { width:13px; height:13px; }
  .no-recordings { font-size:0.75rem; color:var(--text-muted); opacity:0.5; text-align:center; padding:0.5rem 0; font-style:italic; }

  @media print {
    .detail-panel,.toolbar { display:none !important; }
    .app-body { grid-template-columns:1fr; }
    body { background:#fff; color:#000; }
    .task-label { color:#000 !important; opacity:1 !important; }
  }
  @media (max-width:820px) {
    .app-body { grid-template-columns:1fr; }
    .detail-panel { display:none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="title-block">
      <h1>The Victoverse Press</h1>
      <p>Unleash Your Inner Blueprint — Production Tracker</p>
    </div>
    <div class="header-right">
      <div class="stats-row">
        <div class="stat"><div class="stat-num" id="done-count">0</div><div class="stat-label">Complete</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-num" id="active-count">0</div><div class="stat-label">In Progress</div></div>
        <div class="stat-divider"></div>
        <div class="stat"><div class="stat-num" id="todo-count">0</div><div class="stat-label">To Do</div></div>
      </div>
      <div class="toolbar">
        <button class="btn-icon" onclick="toggleTheme()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <span id="theme-label">Light</span>
        </button>
        <button class="btn-icon" onclick="window.print()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          Print
        </button>
        <button class="btn-icon" onclick="exportData()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
      </div>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-pct" id="progress-pct">0%</div>
  </div>
  <div class="countdown-bar" id="countdown-bar"></div>
</div>

<div class="app-body">
  <div class="task-list-col" id="main"></div>
  <div class="detail-panel" id="detail-panel">
    <div class="panel-empty" id="panel-empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>
      <p>Click any task to open<br>its detail panel</p>
    </div>
    <div class="panel-content" id="panel-content" style="display:none">
      <div class="panel-header">
        <div class="panel-phase" id="panel-phase"></div>
        <div class="panel-title" id="panel-title"></div>
        <div class="panel-controls">
          <div class="ctrl-row">
            <span class="ctrl-label">Status</span>
            <select class="status-select" id="panel-status" onchange="updateSelectedStatus()">
              <option value="todo">To Do</option>
              <option value="active">In Progress</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="ctrl-row">
            <span class="ctrl-label">Date</span>
            <input class="date-input" id="panel-date" type="text" placeholder="e.g. this weekend, May 4…" oninput="updateSelectedDate()">
          </div>
        </div>
      </div>
      <div class="panel-body">
        <div>
          <div class="section-label">Notes</div>
          <textarea class="note-textarea" id="panel-note" placeholder="Add notes, context, or next steps…" rows="5" oninput="updateSelectedNote()"></textarea>
        </div>
        <div class="voice-section">
          <div class="section-label">Voice Notes</div>
          <div class="recorder-bar">
            <button class="rec-btn idle" id="rec-btn" onclick="toggleRecording()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
            </button>
            <span class="rec-status" id="rec-status">Tap to record a voice note</span>
          </div>
          <div class="recordings-list" id="recordings-list"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
let keyDates = [
  { label:"Raquel call", date:"2025-05-04" },
  { label:"Manuscript returns", date:"2025-05-14" },
];

const phases = [
  { title:"Editorial", tasks:[
    {id:"e1",label:"Write manuscript",status:"done"},
    {id:"e2",label:"Read through and refine",status:"done"},
    {id:"e3",label:"Compile Word document with ISBNs and publishing name",status:"done"},
    {id:"e4",label:"Send manuscript and brief to Andrew",status:"done"},
    {id:"e5",label:"Andrew proofreads manuscript",status:"active",meta:{badge:"active",text:"returns May 14"}},
    {id:"e6",label:"Review Andrew's tracked changes and notes",status:"todo",meta:{badge:"pending",text:"after May 14"}},
    {id:"e7",label:"Make final manuscript revisions",status:"todo",meta:{badge:"pending",text:"after May 14"}},
  ]},
  { title:"Design", tasks:[
    {id:"d1",label:"Vision document sent to Raquel",status:"done"},
    {id:"d2",label:"Call with Raquel",status:"active",meta:{badge:"active",text:"May 4"}},
    {id:"d3",label:"Get technical specifications from Raquel",status:"todo",meta:{badge:"pending",text:"after May 4"}},
    {id:"d4",label:"Confirm designer and agree terms",status:"todo",meta:{badge:"pending",text:"pending"}},
    {id:"d5",label:"Designer begins interior layout and cover",status:"todo",meta:{badge:"pending",text:"after May 14"}},
    {id:"d6",label:"Review sample spreads — BLAD stage",status:"todo",meta:{badge:"pending",text:"TBC"}},
    {id:"d7",label:"Sign off final design",status:"todo",meta:{badge:"pending",text:"TBC"}},
  ]},
  { title:"Illustration", tasks:[
    {id:"i1",label:"Simon Hook confirmed as illustrator",status:"done"},
    {id:"i2",label:"Pass Raquel's technical specs to Simon",status:"todo",meta:{badge:"pending",text:"after May 4"}},
    {id:"i3",label:"Confirm Simon's timeline",status:"todo",meta:{badge:"pending",text:"after May 4"}},
    {id:"i4",label:"Simon completes 10 illustrations",status:"todo",meta:{badge:"pending",text:"timeline TBC"}},
    {id:"i5",label:"Illustrations delivered to designer",status:"todo",meta:{badge:"pending",text:"TBC"}},
  ]},
  { title:"Publishing & Legal", tasks:[
    {id:"p1",label:"The Victoverse Press established as imprint",status:"done"},
    {id:"p2",label:"10 ISBNs registered with Nielsen",status:"done"},
    {id:"p3",label:"Register Victoverse Ltd at Companies House",status:"todo",meta:{badge:"cost",text:"£12"}},
    {id:"p4",label:"ICO GDPR registration",status:"todo",meta:{badge:"cost",text:"£40/yr"}},
    {id:"p5",label:"Legal deposit with British Library",status:"todo",meta:{badge:"pending",text:"free"}},
  ]},
  { title:"Website & Digital", tasks:[
    {id:"w1",label:"Domains purchased — .com and .co.uk",status:"done"},
    {id:"w2",label:"Squarespace site created and saved",status:"done"},
    {id:"w3",label:"Set up professional email address",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"w4",label:"Subscribe to Squarespace Core plan",status:"todo",meta:{badge:"cost",text:"£17/mo"}},
    {id:"w5",label:"Set up Mailchimp or ConvertKit for registration",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"w6",label:"Build members area with video content",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"w7",label:"Set up Map Makers community platform",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"w8",label:"Connect domains and go live",status:"todo",meta:{badge:"pending",text:"after design"}},
  ]},
  { title:"Content Recording", tasks:[
    {id:"c1",label:"Recording equipment ready",status:"done"},
    {id:"c2",label:"Script 10 Compass videos — one per step",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"c3",label:"Record 10 Compass whiteboard videos",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"c4",label:"Record Scroll voice recordings",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"c5",label:"Upload all content to website",status:"todo",meta:{badge:"pending",text:"to do"}},
  ]},
  { title:"The Blueprint Collective", tasks:[
    {id:"b1",label:"Kristal briefed — The Business Blueprint",status:"done"},
    {id:"b2",label:"Emma briefed — The Crystal Blueprint",status:"done"},
    {id:"b3",label:"Crystal samples ordered from India",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"b4",label:"Emma approves crystal quality",status:"todo",meta:{badge:"pending",text:"to do"}},
    {id:"b5",label:"Crystal shop set up on website",status:"todo",meta:{badge:"pending",text:"phase 2"}},
    {id:"b6",label:"Brief remaining Blueprint Collective members",status:"todo",meta:{badge:"pending",text:"to do"}},
  ]},
  { title:"Launch", tasks:[
    {id:"l1",label:"Final proofed and designed files ready",status:"todo",meta:{badge:"pending",text:"TBC"}},
    {id:"l2",label:"Upload to Amazon KDP",status:"todo",meta:{badge:"pending",text:"TBC"}},
    {id:"l3",label:"Order proof copy",status:"todo",meta:{badge:"pending",text:"TBC"}},
    {id:"l4",label:"Approve and publish",status:"todo",meta:{badge:"pending",text:"TBC"}},
    {id:"l5",label:"Send copy to Anita Moorjani",status:"todo",meta:{badge:"pending",text:"on launch"}},
    {id:"l6",label:"Launch Map Makers community",status:"todo",meta:{badge:"pending",text:"on launch"}},
  ]},
];

const STORAGE_KEY = 'victoverse_tracker_v3';
let selectedPi = null, selectedTi = null;
let mediaRecorder = null, audioChunks = [], isRecording = false;

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;
    const state = JSON.parse(saved);
    phases.forEach(phase => phase.tasks.forEach(task => {
      if (state.statuses?.[task.id]) task.status = state.statuses[task.id];
      if (state.notes?.[task.id] !== undefined) task.note = state.notes[task.id];
      if (state.dates?.[task.id] !== undefined) { if(!task.meta) task.meta={}; task.meta.text = state.dates[task.id]; }
      if (state.recordings?.[task.id]) task.recordings = state.recordings[task.id];
    }));
    if (state.keyDates) keyDates = state.keyDates;
    if (state.theme) {
      document.documentElement.setAttribute('data-theme', state.theme);
      document.getElementById('theme-label').textContent = state.theme==='dark'?'Light':'Dark';
    }
  } catch(e) {}
}

function saveState() {
  const statuses={}, notes={}, dates={}, recordings={};
  phases.forEach(phase => phase.tasks.forEach(task => {
    statuses[task.id] = task.status;
    if (task.note) notes[task.id] = task.note;
    if (task.meta?.text) dates[task.id] = task.meta.text;
    if (task.recordings?.length) recordings[task.id] = task.recordings;
  }));
  const theme = document.documentElement.getAttribute('data-theme');
  localStorage.setItem(STORAGE_KEY, JSON.stringify({statuses,notes,dates,recordings,keyDates,theme}));
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('theme-label').textContent = isDark?'Dark':'Light';
  saveState();
}

function renderCountdown() {
  const bar = document.getElementById('countdown-bar');
  const today = new Date(); today.setHours(0,0,0,0);
  bar.innerHTML = keyDates.map((kd,i) => {
    const d = new Date(kd.date); d.setHours(0,0,0,0);
    const diff = Math.round((d-today)/86400000);
    const dayStr = diff>0?diff:diff===0?'!':'✓';
    const label = diff>0?'days to':diff===0?'today —':'passed —';
    return `<div class="countdown-item" onclick="editKeyDate(${i})">
      <div class="countdown-days">${dayStr}</div>
      <div class="countdown-label">${label} <strong>${kd.label}</strong></div>
      ${i<keyDates.length-1?'<div class="dot"></div>':''}
    </div>`;
  }).join('');
}

function editKeyDate(i) {
  const kd = keyDates[i];
  const val = prompt(`Update date for "${kd.label}" (YYYY-MM-DD):`, kd.date);
  if (val!==null && val.trim()) { keyDates[i].date=val.trim(); saveState(); renderCountdown(); }
}

function selectTask(pi, ti) {
  selectedPi=pi; selectedTi=ti;
  const task = phases[pi].tasks[ti];
  document.getElementById('panel-empty').style.display='none';
  document.getElementById('panel-content').style.display='flex';
  document.getElementById('panel-phase').textContent = phases[pi].title;
  document.getElementById('panel-title').textContent = task.label;
  document.getElementById('panel-status').value = task.status;
  document.getElementById('panel-date').value = task.meta?.text||'';
  document.getElementById('panel-note').value = task.note||'';
  renderRecordings();
  document.querySelectorAll('.task').forEach(t=>t.classList.remove('selected'));
  document.querySelectorAll(`[data-pi="${pi}"][data-ti="${ti}"]`).forEach(el=>el.classList.add('selected'));
}

function updateSelectedStatus() {
  if (selectedPi===null) return;
  phases[selectedPi].tasks[selectedTi].status = document.getElementById('panel-status').value;
  saveState(); render(); selectTask(selectedPi, selectedTi);
}

function updateSelectedDate() {
  if (selectedPi===null) return;
  const val = document.getElementById('panel-date').value;
  if (!phases[selectedPi].tasks[selectedTi].meta) phases[selectedPi].tasks[selectedTi].meta={};
  phases[selectedPi].tasks[selectedTi].meta.text = val;
  saveState(); render();
}

function updateSelectedNote() {
  if (selectedPi===null) return;
  phases[selectedPi].tasks[selectedTi].note = document.getElementById('panel-note').value;
  saveState();
}

async function toggleRecording() {
  if (isRecording) {
    mediaRecorder.stop(); isRecording=false;
    document.getElementById('rec-btn').className='rec-btn idle';
    document.getElementById('rec-status').textContent='Saving…';
    document.getElementById('rec-status').className='rec-status';
  } else {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks=[];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.onstop = () => {
        const blob = new Blob(audioChunks,{type:'audio/webm'});
        const reader = new FileReader();
        reader.onload = () => {
          const task = phases[selectedPi].tasks[selectedTi];
          if (!task.recordings) task.recordings=[];
          task.recordings.push({dataUrl:reader.result, time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});
          saveState(); renderRecordings();
          document.getElementById('rec-status').textContent='Tap to record a voice note';
          stream.getTracks().forEach(t=>t.stop());
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start(); isRecording=true;
      document.getElementById('rec-btn').className='rec-btn recording';
      document.getElementById('rec-status').textContent='Recording… tap to stop';
      document.getElementById('rec-status').className='rec-status active';
    } catch(e) {
      document.getElementById('rec-status').textContent='Microphone access denied';
    }
  }
}

function deleteRecording(idx) {
  phases[selectedPi].tasks[selectedTi].recordings.splice(idx,1);
  saveState(); renderRecordings();
}

function renderRecordings() {
  const list = document.getElementById('recordings-list');
  const recs = phases[selectedPi].tasks[selectedTi].recordings||[];
  if (!recs.length) { list.innerHTML='<div class="no-recordings">No voice notes yet</div>'; return; }
  list.innerHTML = recs.map((rec,i)=>`
    <div class="recording-item">
      <audio controls src="${rec.dataUrl}"></audio>
      <span class="rec-time">${rec.time}</span>
      <button class="del-rec" onclick="deleteRecording(${i})">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
    </div>`).join('');
}

function exportData() {
  let text = 'THE VICTOVERSE PRESS — PROJECT TRACKER\n';
  text += 'Exported: '+new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})+'\n\n';
  phases.forEach(phase => {
    const done = phase.tasks.filter(t=>t.status==='done').length;
    text += `── ${phase.title.toUpperCase()} (${done}/${phase.tasks.length})\n`;
    phase.tasks.forEach(task => {
      const mark = task.status==='done'?'✓':task.status==='active'?'→':'○';
      const date = task.meta?.text?` [${task.meta.text}]`:'';
      text += `  ${mark} ${task.label}${date}\n`;
      if (task.note) text += `     Note: ${task.note}\n`;
      if (task.recordings?.length) text += `     Voice notes: ${task.recordings.length}\n`;
    });
    text += '\n';
  });
  const blob = new Blob([text],{type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'victoverse-tracker.txt';
  a.click();
}

const badgeClass = {done:"done-badge",active:"active-badge",pending:"pending-badge",urgent:"urgent-badge",cost:"cost-badge"};

function render() {
  const main = document.getElementById('main');
  main.innerHTML='';
  phases.forEach((phase,pi) => {
    const div = document.createElement('div');
    div.className='phase';
    const doneCount = phase.tasks.filter(t=>t.status==='done').length;
    div.innerHTML=`<div class="phase-header"><div class="phase-title">${phase.title}</div><div class="phase-line"></div><div class="phase-count">${doneCount}/${phase.tasks.length}</div></div><div class="tasks" id="phase-${pi}"></div>`;
    main.appendChild(div);
    const container = div.querySelector(`#phase-${pi}`);
    phase.tasks.forEach((task,ti) => {
      const t = document.createElement('div');
      const isSelected = selectedPi===pi && selectedTi===ti;
      t.className = 'task'+(task.status==='done'?' done':'')+(task.status==='active'?' in-progress':'')+(isSelected?' selected':'');
      t.setAttribute('data-pi',pi); t.setAttribute('data-ti',ti);
      let metaHtml='';
      if (task.status==='done') metaHtml=`<span class="badge done-badge">done</span>`;
      else if (task.status==='active') { metaHtml=`<span class="badge active-badge">in progress</span>`; if(task.meta?.text) metaHtml+=`<span class="task-date">${task.meta.text}</span>`; }
      else if (task.meta) metaHtml=`<span class="badge ${badgeClass[task.meta.badge]||'pending-badge'}">${task.meta.text||''}</span>`;
      const indicators = (task.note?.trim()?'📝':'')+(task.recordings?.length?'🎙':'');
      t.innerHTML=`<div class="task-row"><div class="check ${task.status==='done'?'checked':''}"></div><div class="task-label">${task.label}</div>${indicators?`<span class="task-indicators">${indicators}</span>`:''}<div class="task-meta">${metaHtml}</div></div>`;
      t.addEventListener('click', () => selectTask(pi,ti));
      // double-click to toggle done
      t.addEventListener('dblclick', () => {
        phases[pi].tasks[ti].status = task.status==='done'?'todo':'done';
        saveState(); render();
        if (selectedPi===pi && selectedTi===ti) selectTask(pi,ti);
      });
      container.appendChild(t);
    });
  });
  updateStats();
}

function updateStats() {
  let done=0,active=0,todo=0,total=0;
  phases.forEach(p=>p.tasks.forEach(t=>{ total++; if(t.status==='done')done++; else if(t.status==='active')active++; else todo++; }));
  document.getElementById('done-count').textContent=done;
  document.getElementById('active-count').textContent=active;
  document.getElementById('todo-count').textContent=todo;
  const pct=Math.round((done/total)*100);
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-pct').textContent=pct+'%';
}

loadState(); renderCountdown(); render();
</script>
